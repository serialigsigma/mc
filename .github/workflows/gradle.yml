name: Build Minecraft Client

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları çek
        uses: actions/checkout@v3

      - name: Java kur
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build (Gradle)
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: JAR upload
        uses: actions/upload-artifact@v3
        with:
          name: minecraft-client
          path: build/libs/*.jar
